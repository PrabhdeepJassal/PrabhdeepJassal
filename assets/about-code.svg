<svg xmlns="http://www.w3.org/2000/svg" width="650" height="320" viewBox="0 0 650 320">
  <rect width="650" height="320" fill="#0D1117" rx="8"/>

  <style>
    .text { font-family: 'Fira Code', 'Consolas', 'Courier New', monospace; font-size: 17px; }
    .comment { fill: #8B949E; }
    .key { fill: #FF7B72; }
    .sep { fill: #79C0FF; }
    .val { fill: #A5D6FF; }
    .bullet { fill: #FFA657; }
    .cursor { fill: #58A6FF; }
  </style>

  <!-- Cursor blink for realism -->
  <rect x="0" y="0" width="10" height="20" fill="#58A6FF" opacity="0">
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite" begin="0s"/>
  </rect>

  <defs>
    <mask id="m1"><rect x="20" y="18" width="0" height="26" fill="white"><animate attributeName="width" from="0" to="600" dur="1s" begin="0.3s" fill="freeze"/></rect></mask>
    <mask id="m2"><rect x="20" y="48" width="0" height="26" fill="white"><animate attributeName="width" from="0" to="600" dur="0.8s" begin="1.6s" fill="freeze"/></rect></mask>
    <mask id="m3"><rect x="20" y="78" width="0" height="26" fill="white"><animate attributeName="width" from="0" to="600" dur="0.8s" begin="2.7s" fill="freeze"/></rect></mask>
    <mask id="m4"><rect x="20" y="108" width="0" height="26" fill="white"><animate attributeName="width" from="0" to="600" dur="0.8s" begin="3.8s" fill="freeze"/></rect></mask>
    <mask id="m5"><rect x="20" y="138" width="0" height="26" fill="white"><animate attributeName="width" from="0" to="600" dur="0.8s" begin="4.9s" fill="freeze"/></rect></mask>
    <mask id="m6"><rect x="40" y="168" width="0" height="26" fill="white"><animate attributeName="width" from="0" to="600" dur="0.3s" begin="6s" fill="freeze"/></rect></mask>
    <mask id="m7"><rect x="40" y="198" width="0" height="26" fill="white"><animate attributeName="width" from="0" to="600" dur="0.3s" begin="6.5s" fill="freeze"/></rect></mask>
    <mask id="m8"><rect x="40" y="228" width="0" height="26" fill="white"><animate attributeName="width" from="0" to="600" dur="0.3s" begin="7s" fill="freeze"/></rect></mask>
    <mask id="m9"><rect x="40" y="258" width="0" height="26" fill="white"><animate attributeName="width" from="0" to="600" dur="0.3s" begin="7.5s" fill="freeze"/></rect></mask>
    <mask id="m10"><rect x="40" y="288" width="0" height="26" fill="white"><animate attributeName="width" from="0" to="600" dur="0.3s" begin="8s" fill="freeze"/></rect></mask>
  </defs>

  <g class="text">
    <text class="comment" x="24" y="38" mask="url(#m1)"># developer.yaml</text>
    <text x="24" y="68" mask="url(#m2)"><tspan class="key">name</tspan><tspan class="sep">: </tspan><tspan class="val">Prabhdeep Singh</tspan></text>
    <text x="24" y="98" mask="url(#m3)"><tspan class="key">location</tspan><tspan class="sep">: </tspan><tspan class="val">India</tspan></text>
    <text x="24" y="128" mask="url(#m4)"><tspan class="key">role</tspan><tspan class="sep">: </tspan><tspan class="val">Software Engineer</tspan></text>
    <text x="24" y="158" mask="url(#m5)"><tspan class="key">languages</tspan><tspan class="sep">:</tspan></text>
    <text class="bullet" x="42" y="188" mask="url(#m6)">- Python</text>
    <text class="bullet" x="42" y="218" mask="url(#m7)">- Java</text>
    <text class="bullet" x="42" y="248" mask="url(#m8)">- Dart</text>
    <text class="bullet" x="42" y="278" mask="url(#m9)">- JavaScript</text>
    <text class="bullet" x="42" y="308" mask="url(#m10)">- TypeScript</text>
  </g>
</svg>
